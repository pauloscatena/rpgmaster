services:
  db:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: rpgmaster
      POSTGRES_DB: rpgmaster
    ports:
      - "55432:5432"
    volumes:
      - rpgmaster-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 10

  bot:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgres://postgres:rpgmaster@db:5432/rpgmaster
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "npm run migrate && npm run register-commands && npm run dev"

volumes:
  rpgmaster-db-data:
